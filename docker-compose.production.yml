version: '3.3'

volumes:
  static:
  media:
  pg_data:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: <dockerhub_username>/kittygram_backend:latest
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/app/static
      - media:/app/media

  frontend:
    image: <dockerhub_username>/kittygram_frontend:latest
    volumes:
      - static:/app/build/static

  gateway:
    image: <dockerhub_username>/kittygram_gateway:latest
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - static:/static
      - media:/media
